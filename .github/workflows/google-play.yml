name: Google Play

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      track:
        description: "Google Play track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: "Release status"
        required: true
        default: "draft"
        type: choice
        options:
          - draft
          - completed
          - inProgress
          - halted
      validate_only:
        description: "Validate only, do not publish"
        required: true
        default: true
        type: boolean

jobs:
  google-play:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Decode release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Validate Google Play upload
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_only }}
        env:
          GROVETIMER_RELEASE_STORE_FILE: ${{ github.workspace }}/app/release.keystore
          GROVETIMER_RELEASE_STORE_PASSWORD: ${{ secrets.GROVETIMER_RELEASE_STORE_PASSWORD }}
          GROVETIMER_RELEASE_KEY_ALIAS: ${{ secrets.GROVETIMER_RELEASE_KEY_ALIAS }}
          GROVETIMER_RELEASE_KEY_PASSWORD: ${{ secrets.GROVETIMER_RELEASE_KEY_PASSWORD }}
          GROVETIMER_VERSION_CODE: ${{ github.run_number }}
          PLAY_TRACK: ${{ inputs.track }}
          PLAY_RELEASE_STATUS: ${{ inputs.release_status }}
          PLAY_VALIDATE_ONLY: "true"
        run: |
          bundle exec fastlane android build_release
          bundle exec ruby tools/upload_play_store_listing.rb
          bundle exec ruby tools/upload_play_store_release.rb

      - name: Upload closed test to Google Play from main
        if: ${{ github.event_name == 'push' }}
        env:
          GROVETIMER_RELEASE_STORE_FILE: ${{ github.workspace }}/app/release.keystore
          GROVETIMER_RELEASE_STORE_PASSWORD: ${{ secrets.GROVETIMER_RELEASE_STORE_PASSWORD }}
          GROVETIMER_RELEASE_KEY_ALIAS: ${{ secrets.GROVETIMER_RELEASE_KEY_ALIAS }}
          GROVETIMER_RELEASE_KEY_PASSWORD: ${{ secrets.GROVETIMER_RELEASE_KEY_PASSWORD }}
          GROVETIMER_VERSION_CODE: ${{ github.run_number }}
          PLAY_TRACK: alpha
          PLAY_RELEASE_STATUS: draft
        run: |
          bundle exec fastlane android build_release
          bundle exec ruby tools/upload_play_store_listing.rb
          bundle exec ruby tools/upload_play_store_release.rb

      - name: Upload to Google Play manually
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.validate_only }}
        env:
          GROVETIMER_RELEASE_STORE_FILE: ${{ github.workspace }}/app/release.keystore
          GROVETIMER_RELEASE_STORE_PASSWORD: ${{ secrets.GROVETIMER_RELEASE_STORE_PASSWORD }}
          GROVETIMER_RELEASE_KEY_ALIAS: ${{ secrets.GROVETIMER_RELEASE_KEY_ALIAS }}
          GROVETIMER_RELEASE_KEY_PASSWORD: ${{ secrets.GROVETIMER_RELEASE_KEY_PASSWORD }}
          GROVETIMER_VERSION_CODE: ${{ github.run_number }}
          PLAY_TRACK: ${{ inputs.track }}
          PLAY_RELEASE_STATUS: ${{ inputs.release_status }}
        run: |
          bundle exec fastlane android build_release
          bundle exec ruby tools/upload_play_store_listing.rb
          bundle exec ruby tools/upload_play_store_release.rb
